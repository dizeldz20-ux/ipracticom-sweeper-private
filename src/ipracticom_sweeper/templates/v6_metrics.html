{% extends "v6_layout.html" %}
{% block title %}מדדים — סוויפר iPracticom (v6){% endblock %}

{% block v6_content %}
<div class="v6-page-header">
  <h1 class="v6-h1">מדדים</h1>
  <p class="v6-sub">Heatmap 24h × 7d · Uptime 30 ימים. עודכן אוטומטית כל 60 שניות.</p>
</div>

<div class="v6-section">
  <h2 class="v6-h2">צפיפות אירועים · 7 ימים אחרונים</h2>
  <div class="v6-surface-elevated">
    <div id="v6-heatmap" class="v6-heatmap-wrap">טוען...</div>
    <div class="v6-heatmap-legend">
      <span class="v6-legend-label">פחות</span>
      <span class="v6-legend-cell" style="background: var(--slate-900);"></span>
      <span class="v6-legend-cell" style="background: rgba(99,102,241,0.25);"></span>
      <span class="v6-legend-cell" style="background: rgba(99,102,241,0.55);"></span>
      <span class="v6-legend-cell" style="background: rgba(244,63,94,0.45);"></span>
      <span class="v6-legend-cell" style="background: rgba(244,63,94,0.85);"></span>
      <span class="v6-legend-label">יותר</span>
    </div>
  </div>
</div>

<div class="v6-section">
  <h2 class="v6-h2">Uptime · 30 ימים</h2>
  <div class="v6-surface-elevated">
    <div id="v6-uptime" class="v6-uptime-wrap">טוען...</div>
  </div>
</div>

<script>
(function () {
  var heatEl = document.getElementById('v6-heatmap');
  var upEl   = document.getElementById('v6-uptime');

  function colorFor(v, max) {
    if (!v) return 'background: var(--slate-900);';
    var t = max > 0 ? v / max : 0;
    if (t < 0.25) return 'background: rgba(99,102,241,0.25);';
    if (t < 0.5)  return 'background: rgba(99,102,241,0.55);';
    if (t < 0.75) return 'background: rgba(244,63,94,0.45);';
    return 'background: rgba(244,63,94,0.85); color: white;';
  }

  function renderHeatmap(grid) {
    var max = 0;
    grid.forEach(function (row) { row.forEach(function (v) { if (v > max) max = v; }); });
    var html = '<table class="v6-heatmap"><thead><tr><th></th>';
    for (var h = 0; h < 24; h++) html += '<th>' + h + '</th>';
    html += '</tr></thead><tbody>';
    grid.forEach(function (row, di) {
      html += '<tr><th>יום ' + (grid.length - di) + '</th>';
      row.forEach(function (v) {
        html += '<td title="' + v + ' אירועים" style="' + colorFor(v, max) + '">' + v + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    heatEl.innerHTML = html;
  }

  function renderUptime(points) {
    if (!points.length) {
      upEl.innerHTML = '<p class="v6-mute">אין נתוני uptime עדיין.</p>';
      return;
    }
    var W = 600, H = 120;
    var maxDay = points.length - 1;
    var path = '';
    for (var i = 0; i < points.length; i++) {
      var x = (i / maxDay) * W;
      var y = H - points[i].ratio * H;
      path += (i === 0 ? 'M' : ' L') + x.toFixed(1) + ',' + y.toFixed(1);
    }
    // Build filled area.
    var area = path + ' L' + W + ',' + H + ' L0,' + H + ' Z';
    var svg = ''
      + '<svg viewBox="0 0 ' + W + ' ' + H + '" class="v6-uptime-svg" role="img">'
      +   '<path d="' + area + '" fill="rgba(16,185,129,0.25)" stroke="rgba(16,185,129,0.9)" stroke-width="1.5"/>'
      + '</svg>';
    upEl.innerHTML = svg + '<p class="v6-mute v6-small">'
      + points.length + ' ימים · מקור: monitor audit log</p>';
  }

  function tick() {
    fetch('/v6/metrics/events_heatmap', { credentials: 'same-origin' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (j) { if (j) renderHeatmap(j.grid || []); })
      .catch(function () {});
    fetch('/v6/metrics/uptime_30d', { credentials: 'same-origin' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (j) { if (j) renderUptime(j.points || []); })
      .catch(function () {});
  }
  tick();
  setInterval(tick, 60000);
})();
</script>
{% endblock %}
